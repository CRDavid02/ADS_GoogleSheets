<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --green: #1e5c37;
  --green-light: #e8f4ec;
  --green-dark: #123a22;
  --orange: #d97706;
  --red: #dc2626;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text2: #64748b;
  --border: #e2e8f0;
  --libre: #1e5c37;
  --incompleto: #d97706;
  --ocupado: #dc2626;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
}

html, body {
  height: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  overflow: hidden;
  color: var(--text);
}

button, input, select, textarea {
  font-family: inherit;
  border: none;
  outline: none;
}
button { cursor: pointer; }

#app {
  width: 100%;
  max-width: 420px;
  height: 100dvh;
  margin: 0 auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
}

.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }
.screen-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 90px; }
.screen-body::-webkit-scrollbar { display: none; }

.topbar { display: flex; align-items: center; gap: 12px; background: #fff; padding: 12px 16px; border-bottom: 1px solid var(--border); min-height: 56px; }
.topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.topbar-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar-icon { font-size: 20px; padding: 8px; border-radius: 10px; color: var(--text2); transition: all 0.2s; }
.topbar-icon:hover { background: var(--bg); color: var(--text); }

.taskbar { display: none; justify-content: space-around; align-items: center; background: #0f172a; height: 64px; padding: 0 12px; border-top: 1px solid rgba(255,255,255,.04); }
.taskbar-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 14px; color: #94a3b8; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.taskbar-item:active { transform: scale(0.92); }
.taskbar-item.active { background: rgba(255, 255, 255, 0.06); color: #fff; }
.taskbar-icon { font-size: 20px; }
.taskbar-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 4px; }
.taskbar-item.active .taskbar-dot { background: #34d399; }

#screen-splash { background: var(--green); align-items: center; justify-content: center; position: absolute; inset: 0; z-index: 500; }
.splash-logo { text-align: center; color: #fff; }
.splash-logo .icon { font-size: 64px; margin-bottom: 16px; }
.splash-logo h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
.splash-logo p { font-size: 11px; opacity: 0.6; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }

#screen-login { background: var(--green); }
.login-top { background: var(--green); padding: 48px 24px 32px; text-align: center; color: #fff; }
.login-top h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
.app-logo { font-size: 48px; margin-bottom: 8px; }
.login-card { background: #fff; flex: 1; border-radius: 32px 32px 0 0; padding: 32px 24px; overflow-y: auto; }
.login-card h2 { font-size: 22px; margin-bottom: 24px; font-weight: 700; letter-spacing: -0.3px; }
.login-switch { font-size: 13px; color: var(--text2); text-align: center; margin-top: 16px; }
.login-switch a { color: var(--green); font-weight: 600; cursor: pointer; }
.divider { text-align: center; color: var(--text2); font-size: 12px; margin: 16px 0; }

.field { margin-bottom: 16px; }
.field label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }
.field-wrap { display: flex; align-items: center; background: var(--bg); border: 1px solid transparent; border-radius: 12px; padding: 0 14px; transition: all 0.2s; }
.field-wrap:focus-within { border-color: var(--green); background: #fff; box-shadow: 0 0 0 4px var(--green-light); }
.field-wrap input, .field-wrap select, .field-wrap textarea { flex: 1; padding: 12px 0; font-size: 14px; color: var(--text); background: transparent; }
.ficon { font-size: 16px; margin-right: 8px; opacity: 0.5; }

.btn-primary { width: 100%; padding: 14px; background: var(--green); color: #fff; border-radius: 12px; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { width: 100%; padding: 14px; background: var(--green-light); color: var(--green); border-radius: 12px; font-size: 14px; font-weight: 600; }
.btn-outline { width: 100%; padding: 12px; background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; }
.btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { padding: 7px 14px; font-size: 12px; width: auto; border-radius: 8px; }
.btn-back { background: var(--bg); border: none; font-size: 20px; padding: 6px 10px; border-radius: 10px; color: var(--text); }

.badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px; }
.badge-libre { background: #f0fdf4; color: var(--libre); }
.badge-incompleto { background: #fffbeb; color: var(--incompleto); }
.badge-ocupado { background: #fef2f2; color: var(--ocupado); }

/* MAPA */
.map-container { flex: 1; min-height: 0; position: relative; background: #c8d5b9; overflow: hidden; }
#leaflet-map { width: 100%; height: 100%; z-index: 1; }
#leaflet-map .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
#leaflet-map .leaflet-popup-tip { display: none; }

/* BOTTOM SHEET */
.bottom-sheet {
  background: #fff;
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 40px rgba(15, 23, 42, 0.06);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  --sh-peek: 64px;
  --sh-mid: 50%;
  --sh-full: 88%;
  height: var(--sh-mid);
  transition: height .35s cubic-bezier(0.16, 1, 0.3, 1);
  touch-action: none;
}
.bottom-sheet.peek { height: var(--sh-peek); }
.bottom-sheet.full { height: var(--sh-full); }

.sheet-handle { width: 32px; height: 4px; background: #cbd5e1; border-radius: 2px; margin: 12px auto; flex-shrink: 0; cursor: grab; opacity: 0.6; transition: opacity 0.2s, background 0.2s; }
.bottom-sheet:hover .sheet-handle { opacity: 1; background: #94a3b8; }
.sheet-title-row { padding: 0 20px 12px; }
.sheet-title { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 10px; display: block; }
.sheet-list { padding: 0 20px 20px; overflow-y: auto; }

.filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--text2); transition: all 0.2s; cursor: pointer; }
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }

/* BUSCADOR */
.search-bar { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 12px; padding: 0 14px; margin-bottom: 12px; border: 1px solid transparent; transition: all 0.2s; }
.search-bar:focus-within { background: #fff; border-color: var(--border); box-shadow: var(--shadow); }
.search-icon { font-size: 14px; flex-shrink: 0; opacity: 0.5; }
.search-input { flex: 1; padding: 12px 0; font-size: 13px; color: var(--text); background: transparent; }
.search-input::placeholder { color: var(--text2); }
.search-clear { background: none; border: none; font-size: 13px; color: var(--text2); padding: 4px; cursor: pointer; flex-shrink: 0; border-radius: 50%; }

/* TARJETAS CANCHAS */
.cancha-card { display: flex; align-items: center; gap: 14px; background: var(--card); border-radius: 14px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; }
.cancha-card:active { transform: scale(0.98); background: var(--bg); }
.cancha-card-icon { font-size: 24px; flex-shrink: 0; width: 44px; height: 44px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.cancha-card-body { flex: 1; min-width: 0; }
.cancha-name { font-size: 14px; font-weight: 600; letter-spacing: -0.1px; }
.cancha-loc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.cancha-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.cancha-sport { font-size: 11px; color: var(--text2); }
.cancha-arrow { font-size: 16px; color: var(--text2); opacity: 0.5; }

/* DETALLE CANCHA */
.detalle-hero { padding: 20px; background: #fff; border-bottom: 1px solid var(--border); }
.detalle-icon { font-size: 40px; margin-bottom: 8px; }
.detalle-nombre { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
.detalle-loc { font-size: 13px; color: var(--text2); margin-top: 4px; }
.detalle-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.detalle-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.detalle-section h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 12px; }
.detalle-actions { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.detalle-map { height: 180px; border-radius: 14px; overflow: hidden; margin-top: 8px; }
.reporte-stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 13px; }
.reporte-stat:last-child { border-bottom: none; }

/* PARTIDOS */
.partido-card { background: var(--card); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
.partido-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.partido-nombre { font-size: 14px; font-weight: 700; }
.partido-info { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.partido-jugadores { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.partido-progress { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
.progress-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* ALERTAS */
.alerta-card { background: #fff; margin: 7px 16px; border-radius: var(--radius); padding: 13px 15px; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
.alerta-nueva { border-left: 3px solid var(--green); }
.alerta-icon { font-size: 22px; flex-shrink: 0; }
.alerta-body { flex: 1; }
.alerta-titulo { font-size: 14px; font-weight: 700; color: var(--text); }
.alerta-msg { font-size: 12px; color: var(--text2); margin-top: 3px; }
.alerta-tiempo { font-size: 11px; color: var(--text2); margin-top: 5px; }
.alerta-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-top: 5px; flex-shrink: 0; }

/* PERFIL */
.perfil-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--green); color: #fff; font-size: 28px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 32px auto 12px; }
.perfil-nombre { text-align: center; font-size: 20px; font-weight: 700; }
.perfil-correo { text-align: center; font-size: 13px; color: var(--text2); margin-top: 4px; }
.perfil-rol { text-align: center; font-size: 11px; font-weight: 600; color: var(--green); background: var(--green-light); padding: 4px 12px; border-radius: 20px; display: inline-block; margin: 8px auto; }

/* ADMIN */
.stat-card { background: var(--card); border-radius: 14px; padding: 16px; text-align: center; border: 1px solid var(--border); }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 600; }
.adm-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
.adm-section { padding: 16px; }
.adm-section h3 { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
.reporte-card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.reporte-info { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.reporte-coment { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.reporte-actions { display: flex; gap: 8px; }
.adm-cancha-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg); font-size: 13px; }

/* SIDEBAR */
.sidebar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; }
.sidebar-overlay.open { display: block; }
.sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 280px; background: #fff; z-index: 101; transform: translateX(-100%); transition: transform .3s; display: flex; flex-direction: column; }
.sidebar.open { transform: translateX(0); }
.sidebar-header { padding: 48px 20px 20px; background: var(--green); color: #fff; }
.sidebar-menu { flex: 1; padding: 16px 0; overflow-y: auto; }
.sidebar-item { display: flex; align-items: center; gap: 14px; padding: 13px 20px; font-size: 14px; font-weight: 500; color: var(--text); transition: background .15s; cursor: pointer; }
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active { color: var(--green); background: var(--green-light); }
.sidebar-icon { font-size: 20px; width: 24px; text-align: center; }

/* MODAL */
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: #fff; border-radius: 28px 28px 0 0; padding: 24px; width: 100%; max-height: 85%; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

/* DONUT */
.donut-wrap { display: flex; align-items: center; gap: 16px; padding: 16px; }
#donut { flex-shrink: 0; }
#donut-labels { display: flex; flex-direction: column; gap: 6px; font-size: 12px; font-weight: 600; }

/* UTILIDADES */
#toast { position: absolute; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0f172a; color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .3s; white-space: nowrap; z-index: 300; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,.2); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#loading { position: absolute; inset: 0; background: rgba(255,255,255,.8); z-index: 400; display: none; align-items: center; justify-content: center; font-size: 32px; backdrop-filter: blur(4px); }
#loading.show { display: flex; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; color: var(--text2); text-align: center; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; font-weight: 600; }
.empty-state-sm { padding: 16px; text-align: center; font-size: 13px; color: var(--text2); }
</style>
